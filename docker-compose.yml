services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    image: ghcr.io/${GHCR_NAMESPACE}/bluebits-backend:latest
    security_opt:
      - seccomp=unconfined
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - ./Backend/data:/app/data
      - ./Backend/uploads:/app/uploads
      - ./Resources/PandocTemplates:/app/Resources/PandocTemplates
      - ./Backend/appsettings.Docker.json:/app/appsettings.Docker.json
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: curl --fail http://localhost:8080/swagger/index.html || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    image: ghcr.io/${GHCR_NAMESPACE}/bluebits-frontend:latest
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=bluebits123
      - SEQ_BASEURI=https://139.59.157.34/seq/
    volumes:
      - seq-data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

volumes:
  seq-data:
