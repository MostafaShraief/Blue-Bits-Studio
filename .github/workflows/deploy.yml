# Required GitHub Secrets (set in repo: Settings > Secrets and variables > Actions):
#   DROPLET_HOST            - DigitalOcean Droplet IP address
#   DROPLET_USER            - SSH username for the Droplet (usually "root")
#   DROPLET_SSH_KEY         - Private SSH key for Droplet access (copy full key including headers)
#   DROPLET_SSH_PASSPHRASE  - Passphrase for the SSH key (leave empty if no passphrase)

name: Deploy to Droplet

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Backup existing database on Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          script: |
            mkdir -p /opt/bluebits/data
            if [ -f /opt/bluebits/data/bluebits.db ]; then
              cp /opt/bluebits/data/bluebits.db /opt/bluebits/data/bluebits.db.bak
              echo "Database backed up successfully."
            else
              echo "No database found to backup. Skipping."
            fi
            
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lowercase repo owner
        run: echo "REPO_OWNER_LOWER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Backend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER_LOWER }}/bluebits-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./Frontend
          file: Frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER_LOWER }}/bluebits-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH into Droplet and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          script: |
            cd /opt/bluebits
            git pull origin main
            echo "GHCR_NAMESPACE=${{ env.REPO_OWNER_LOWER }}" > .env
            mkdir -p Backend/data Backend/uploads
            chmod +x setup-certs.sh && ./setup-certs.sh
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f

      - name: Job summary
        run: |
          echo "## Deploy to Droplet summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend image:** \`ghcr.io/${{ env.REPO_OWNER_LOWER }}/bluebits-backend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend image:** \`ghcr.io/${{ env.REPO_OWNER_LOWER }}/bluebits-frontend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed to:** \`${{ secrets.DROPLET_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** \`${{ github.actor }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
