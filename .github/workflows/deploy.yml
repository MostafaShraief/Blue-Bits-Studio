# Required GitHub Secrets (set in repo: Settings > Secrets and variables > Actions):
#   DROPLET_HOST        - DigitalOcean Droplet IP address
#   DROPLET_USER        - SSH username for the Droplet (usually "root")
#   DROPLET_SSH_KEY     - Private SSH key for Droplet access (copy full key including headers)

name: Deploy to Droplet

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Backend/Dockerfile
          push: true
          tags: ghcr.io/${{ lower(github.repository_owner) }}/bluebits-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: Frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ lower(github.repository_owner) }}/bluebits-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH into Droplet and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/bluebits
            git pull origin main
            mkdir -p Backend/data Backend/uploads
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f

      - name: Job summary
        run: |
          echo "## Deploy to Droplet summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend image:** \`ghcr.io/${{ lower(github.repository_owner) }}/bluebits-backend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend image:** \`ghcr.io/${{ lower(github.repository_owner) }}/bluebits-frontend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed to:** \`${{ secrets.DROPLET_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** \`${{ github.actor }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
